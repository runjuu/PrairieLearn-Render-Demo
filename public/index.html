<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PrairieLearn Render Demo</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="bg-white text-ink">
    <main class="min-h-screen">
      <header class="flex h-16 items-center justify-between border-b border-line px-5">
        <div>
          <h1 class="text-lg font-semibold">PrairieLearn Render Demo</h1>
          <p id="status" class="text-sm text-muted">Starting</p>
        </div>
        <div id="previewActions" class="hidden items-center gap-2">
          <button
            id="backButton"
            class="h-9 rounded-md border border-line bg-white px-3 text-sm font-medium text-ink hover:bg-panel"
            type="button"
          >
            Back
          </button>
          <button
            id="variantButton"
            class="h-9 rounded-md bg-emerald-700 px-3 text-sm font-medium text-white hover:bg-emerald-800 disabled:opacity-60"
            type="button"
          >
            New variant
          </button>
        </div>
      </header>

      <section id="listView" class="mx-auto max-w-4xl px-5 py-6">
        <div class="mb-4 flex items-end justify-between gap-4">
          <div>
            <h2 class="text-base font-semibold">Questions</h2>
            <p class="text-sm text-muted">Select a question to render a read-only preview.</p>
          </div>
        </div>
        <div id="questionList" class="divide-y divide-line rounded-md border border-line"></div>
      </section>

      <section id="previewView" class="hidden h-[calc(100vh-4rem)]">
        <div class="grid h-full grid-rows-[auto_1fr]">
          <div class="flex items-center justify-between border-b border-line px-5 py-3">
            <div class="min-w-0">
              <h2 id="questionTitle" class="truncate text-base font-semibold"></h2>
              <p id="questionPath" class="truncate text-sm text-muted"></p>
            </div>
            <p id="variantLabel" class="ml-4 shrink-0 text-sm text-muted"></p>
          </div>
          <iframe
            id="previewFrame"
            class="h-full w-full border-0 bg-white"
            sandbox="allow-scripts allow-same-origin"
            title="PrairieLearn question preview"
          ></iframe>
        </div>
      </section>

      <pre
        id="diagnostics"
        class="fixed bottom-4 right-4 hidden max-h-60 w-[min(42rem,calc(100vw-2rem))] overflow-auto rounded-md border border-red-200 bg-red-50 p-3 text-xs text-red-800 shadow-lg"
      ></pre>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
